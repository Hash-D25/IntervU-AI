# Local development infrastructure only.
# Application containers (backend/frontend) are added in later iterations.
services:
  postgres:
    image: postgres:16-alpine
    container_name: interviewerai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interviewerai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interviewerai}
      POSTGRES_DB: ${POSTGRES_DB:-interviewerai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interviewerai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: interviewerai-chroma
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/data

volumes:
  postgres_data:
  chroma_data:
