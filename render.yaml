services:
  - type: web
    name: intervu-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: intervu-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://intervu-ai-inky.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_API_KEY
        sync: false
      - key: TRANSCRIBER
        value: fake

databases:
  - name: intervu-db
    plan: free
